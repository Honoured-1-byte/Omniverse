<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking Quantum System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050505;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
        }

        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            z-index: 100;
            width: 220px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .section {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            opacity: 0.7;
            color: #4eff4e;
        }

        select,
        input[type="color"] {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            outline: none;
        }

        select:hover {
            border-color: #4eff4e;
        }

        .video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transform: scaleX(-1);
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .video-container:hover {
            opacity: 1;
        }

        #input_video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status {
            font-size: 11px;
            margin-top: 10px;
            color: #ff4e4e;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="ui-panel">
        <div class="section">
            <label>SIMULATION MODE</label>
            <select id="templateSelect">
                <option value="atom">Quantum Atom (Accurate)</option>
                <option value="saturn">Spectral Saturn (Broad)</option>
                <option value="fireworks">Spectral Fireworks</option>
            </select>
        </div>
        <div class="section">
            <label>Electron Pigment (Primary)</label>
            <input type="color" id="colorPicker" value="#00aaff">
        </div>
        <div class="status" id="status">INITIALIZING NEURAL NET...</div>
    </div>

    <div class="video-container">
        <video id="input_video"></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        // --- Configuration & State ---
        let scene, camera, renderer, particles, geometry;
        const PARTICLE_COUNT = 8000;
        let currentTemplate = 'atom';

        // Default to a bright Electric Blue (perfect for electrons)
        const baseColor = new THREE.Color(0x00aaff);
        const tempColor = new THREE.Color();

        let handData = { x: 0, y: 0, z: 0, tension: 0, isActive: false };
        const videoElement = document.getElementById('input_video');
        const statusEl = document.getElementById('status');

        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const colors = new Float32Array(PARTICLE_COUNT * 3);

            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 10;
                colors[i] = 1.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.04,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
            window.addEventListener('resize', onWindowResize);
        }

        // --- Advanced Physics & Color Engine ---
        function updateParticleData(i, template, tension, time) {
            const t = i / PARTICLE_COUNT;
            const angle = t * Math.PI * 2 * 20;
            let x = 0, y = 0, z = 0;
            const scale = 1.5 + (tension * 2);
            const i3 = i * 3;

            const hsl = {};
            baseColor.getHSL(hsl);

            // 1. QUANTUM ATOM (Updated Color Logic)
            if (template === 'atom') {
                // NUCLEUS (Protons & Neutrons) - 20%
                if (i < PARTICLE_COUNT * 0.2) {
                    const isProton = i % 2 === 0;
                    const r = Math.cbrt(Math.random()) * 0.4 * scale;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random() * 2) - 1);
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);

                    // COLOR UPDATE: 
                    // Nucleus gets shifted relative to base.
                    // Protons = Base + 0.33 (120 deg)
                    // Neutrons = Base + 0.66 (240 deg)
                    const hueShift = isProton ? 0.33 : 0.66;
                    tempColor.setHSL((hsl.h + hueShift) % 1.0, 1.0, 0.5);
                }
                // ELECTRONS (Probability Clouds) - 80%
                else {
                    // COLOR UPDATE: Electrons now get the BASE color (what you picked)
                    tempColor.setHSL(hsl.h, 1.0, 0.6);

                    // Quantum Flickering
                    const flicker = (Math.random() - 0.5) * 0.3;

                    // 1s Orbital (Small Sphere)
                    if (i < PARTICLE_COUNT * 0.5) {
                        const r = (1.2 + flicker) * scale;
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos((Math.random() * 2) - 1);
                        x = r * Math.sin(phi) * Math.cos(theta);
                        y = r * Math.sin(phi) * Math.sin(theta);
                        z = r * Math.cos(phi);
                    }
                    // 2p Orbitals (Dumbbells)
                    else {
                        const axis = i % 3;
                        const r = (2.5 + Math.random() + flicker) * scale;
                        const spread = Math.random() * 0.4;
                        const side = i % 2 === 0 ? 1 : -1;
                        if (axis === 0) { x = r * side; y = r * spread * Math.cos(angle); z = r * spread * Math.sin(angle); }
                        if (axis === 1) { y = r * side; x = r * spread * Math.cos(angle); z = r * spread * Math.sin(angle); }
                        if (axis === 2) { z = r * side; x = r * spread * Math.cos(angle); y = r * spread * Math.sin(angle); }
                    }
                }
            }

            // 2. SPECTRAL SATURN
            else if (template === 'saturn') {
                if (i < PARTICLE_COUNT * 0.2) {
                    const phi = Math.acos(-1 + (2 * i / (PARTICLE_COUNT * 0.2)));
                    const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
                    x = Math.cos(theta) * Math.sin(phi) * scale * 0.8;
                    y = Math.sin(theta) * Math.sin(phi) * scale * 0.8;
                    z = Math.cos(phi) * scale * 0.8;
                    tempColor.setHSL(hsl.h, hsl.s, hsl.l);
                } else {
                    const minR = 1.8 * scale;
                    const maxR = 3.5 * scale;
                    const radiusRatio = Math.random();
                    const r = minR + radiusRatio * (maxR - minR);
                    x = Math.cos(angle * 5) * r;
                    z = Math.sin(angle * 5) * r;
                    y = (Math.random() - 0.5) * 0.1 * scale;
                    const hueShift = radiusRatio * 0.15;
                    const lightnessShift = radiusRatio * 0.4;
                    tempColor.setHSL((hsl.h + hueShift) % 1.0, hsl.s, 0.3 + lightnessShift);
                }
            }

            // 3. SPECTRAL FIREWORKS
            // 3. SPECTRAL FIREWORKS (Fixed Color Logic)
            else if (template === 'fireworks') {
                const mag = Math.random() * scale * 3;
                x = Math.cos(angle) * Math.sin(t * Math.PI) * mag;
                y = Math.sin(angle) * Math.sin(t * Math.PI) * mag;
                z = Math.cos(t * Math.PI) * mag;

                // Color Fix: Use Lightness/Heat instead of Hue Shift
                const distanceRatio = mag / (scale * 3); // 0.0 (Center) to 1.0 (Edge)

                // Lightness: Center is Hot (0.9 White), Edge is True Color (0.5)
                const lightness = 0.9 - (distanceRatio * 0.4);

                // Saturation: Center is washed out (0.2), Edge is rich (1.0)
                const saturation = 0.2 + (distanceRatio * 0.8);

                // Use the EXACT Hue you picked (hsl.h), do not shift it
                tempColor.setHSL(hsl.h, saturation, lightness);
            }

            return { pos: { x, y, z }, color: tempColor };
        }

        // --- Hand Tracking ---
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                statusEl.innerText = "SYSTEM LOCKED ON HAND"; statusEl.style.color = "#4eff4e";
                handData.x = (0.5 - landmarks[9].x) * 12;
                handData.y = (0.5 - landmarks[9].y) * 10;
                const thumb = landmarks[4]; const pinky = landmarks[20];
                const dist = Math.sqrt(Math.pow(thumb.x - pinky.x, 2) + Math.pow(thumb.y - pinky.y, 2));
                handData.tension = THREE.MathUtils.lerp(handData.tension, dist * 3, 0.1);
                handData.isActive = true;
            } else {
                statusEl.innerText = "SEARCHING FOR BIO-INPUT..."; statusEl.style.color = "#ff4e4e";
                handData.isActive = false;
            }
        });

        const cameraFeed = new Camera(videoElement, { onFrame: async () => { await hands.send({ image: videoElement }); }, width: 640, height: 480 });
        cameraFeed.start();

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            const positions = geometry.attributes.position.array;
            const colors = geometry.attributes.color.array;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const data = updateParticleData(i, currentTemplate, handData.tension, time);

                const tx = data.pos.x + handData.x;
                const ty = data.pos.y + handData.y;
                const tz = data.pos.z;

                positions[i3] += (tx - positions[i3]) * 0.15;
                positions[i3 + 1] += (ty - positions[i3 + 1]) * 0.15;
                positions[i3 + 2] += (tz - positions[i3 + 2]) * 0.15;

                colors[i3] = data.color.r;
                colors[i3 + 1] = data.color.g;
                colors[i3 + 2] = data.color.b;
            }

            geometry.attributes.position.needsUpdate = true;
            geometry.attributes.color.needsUpdate = true;

            particles.rotation.y += 0.001;
            particles.rotation.z += 0.0005;

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        document.getElementById('templateSelect').addEventListener('change', (e) => currentTemplate = e.target.value);
        document.getElementById('colorPicker').addEventListener('input', (e) => baseColor.set(e.target.value));

        initScene();
        animate();
    </script>
</body>

</html>
