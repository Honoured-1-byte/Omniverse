<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Mood Recommender 🎭</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <a href="../index.html"
        style="position: fixed; top: 20px; left: 20px; z-index: 9999; background: linear-gradient(135deg, #ff4d4d, #5c00e6); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; font-family: 'Poppins', sans-serif; box-shadow: 0 0 10px rgba(0,0,0,0.5);">⬅
        Network Home</a>

    <header>
        <h1>Anime Mood Recommender 🎭</h1>
    </header>

    <main>
        <section id="mood-selection">
            <h2>Select Your Mood</h2>
            <div class="button-container">
                <button class="mood-btn happy" onclick="recommendAnime('happy')">😊 Happy</button>
                <button class="mood-btn sad" onclick="recommendAnime('sad')">😢 Sad</button>
                <button class="mood-btn excited" onclick="recommendAnime('excited')">🤩 Excited</button>
                <button class="mood-btn angry" onclick="recommendAnime('angry')">😡 Angry</button>
            </div>
        </section>

        <section id="recommendations">
            <h2>Recommended Anime</h2>
            <div id="anime-list" class="anime-grid"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
