<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Network | Your Gateway to the Universe</title>
    <style>
        :root {
            --primary: #ff0055;
            --secondary: #2a2a72;
            --dark: #0f0f1a;
            --light: #f0f0f0;
            --accent: #00d4ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark);
            color: var(--light);
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1578632767115-351597cf2477?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            text-align: center;
            position: relative;
        }

        .hero h1 {
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--primary);
            animation: glow 2s ease-in-out infinite alternate;
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 50px;
            color: #ddd;
        }

        /* Cards Container */
        .portal-container {
            display: flex;
            gap: 50px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }

        .portal-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: 300px;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .portal-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }

        .portal-card.primary:hover {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.3);
        }

        .card-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .card-desc {
            padding: 20px;
            text-align: center;
            font-size: 1rem;
            color: #ccc;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
            }

            to {
                text-shadow: 0 0 20px var(--accent), 0 0 30px var(--accent);
            }
        }

        /* Background Animated Particles (Simple CSS implementation) */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>

<body>
    <a href="../../netflix-clone/index.html"
        style="position: fixed; top: 20px; left: 20px; z-index: 9999; background: rgba(0,0,0,0.8); color: white; padding: 10px 15px; border-radius: 30px; text-decoration: none; border: 1px solid #E50914; font-family: sans-serif; font-weight: bold;">
        ⬅ Back to Cinema
    </a>

    <section class="hero">
        <div class="bg-animation"></div>
        <h1>Anime Network</h1>
        <p>Explore the Infinite Universe of Animation</p>

        <div class="portal-container">
            <!-- Link to The Hub (HelloAnime) -->
            <a href="hub/index.html" class="portal-card primary">
                <div class="card-icon">⛩️</div>
                <div class="card-title">The Hub</div>
                <div class="card-desc">News, Reviews, and Community Discussions. The heartbeat of fandom.</div>
            </a>

            <!-- Link to The Gallery (AnimeVerse) -->
            <a href="gallery/index.html" class="portal-card">
                <div class="card-icon">🌌</div>
                <div class="card-title">The Verse</div>
                <div class="card-desc">Visual Arts, Character DB, and immersive galleries.</div>
            </a>
        </div>
    </section>

</body>

</html>
