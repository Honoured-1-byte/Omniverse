<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Anime Detail</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="anime-detail">
        <div class="anime-header">
            <img src="anime1.jpg" alt="Anime Title">
            <div>
                <h1>Anime Title</h1>
                <p>Genre: Action, Adventure</p>
                <p>Rating: ⭐⭐⭐⭐⭐</p>
            </div>
        </div>
        <section class="reviews">
            <h2>Reviews</h2>
            <form>
                <textarea placeholder="Write your review here..." rows="4"></textarea>
                <button type="submit">Submit Review</button>
            </form>
            <div class="review-list">
                <div class="review">
                    <p><strong>Username:</strong> Amazing Anime!</p>
                    <p>⭐⭐⭐⭐⭐</p>
                    <p>This anime was incredible, with great animation and an amazing story.</p>
                </div>
                <!-- More reviews here -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Anime Reviews</p>
    </footer>
</body>
</html>
