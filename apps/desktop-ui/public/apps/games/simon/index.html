<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says game</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <h1>Simon Says Game</h1>
    <h2>Press any key to start</h2>
    <div
        style="margin-top: 1rem; border: 2px solid #00ffea; padding: 10px; width: fit-content; margin-left: auto; margin-right: auto; box-shadow: 0 0 20px #00ffe0;">
        <h2 id="current-level">Press any key to start</h2>
        <h3 id="high-score">High Score: 0</h3>
    </div>


    <div class="btn-container">
        <div class="line-one">
            <div class="btn red" type="button" id="red">1</div>
            <div class="btn blue" type="button" id="blue">2</div>
        </div>
        <div class="line-two">
            <div class="btn yellow" type="button" id="yellow">3</div>
            <div class="btn purple" type="button" id="purple">4</div>
        </div>


    </div>

    <script src="app.js"></script>
</body>

</html>
