<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniNote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617;
            color: #e2e8f0;
            font-family: sans-serif;
        }

        .selection-cyan ::selection {
            background-color: #06b6d4;
            color: white;
        }
    </style>
</head>

<body class="min-h-screen p-6 selection-cyan">
    <div class="max-w-2xl mx-auto">
        <header class="mb-8 flex items-center justify-between border-b border-slate-800 pb-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                📝 OmniNotes
            </h1>
            <span id="count" class="text-xs font-mono text-slate-500">0 items</span>
        </header>

        <form id="noteForm" class="mb-8 flex gap-2">
            <input id="noteInput" type="text" placeholder="Type a new note..."
                class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder:text-slate-600 text-white"
                autofocus autocomplete="off" />
            <button type="submit" id="submitBtn"
                class="px-6 py-3 rounded-xl font-bold transition-all shadow-lg hover:shadow-cyan-500/20 active:scale-95 bg-cyan-600 hover:bg-cyan-500 text-white">
                Add
            </button>
            <button type="button" id="cancelBtn"
                class="hidden px-4 py-3 bg-slate-800 hover:bg-slate-700 rounded-xl text-slate-400 transition-all">
                Cancel
            </button>
        </form>

        <div id="notesList" class="space-y-3">
            <!-- Notes will appear here -->
        </div>

        <div id="emptyState"
            class="hidden text-center py-12 text-slate-600 border-2 border-dashed border-slate-800 rounded-2xl">
            <p>No notes found. Start typing above!</p>
        </div>
    </div>

    <script>
        // State
        let todos = JSON.parse(localStorage.getItem('omni_notepad') || '[]');
        let editingId = null;

        // ROM
        const form = document.getElementById('noteForm');
        const input = document.getElementById('noteInput');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const list = document.getElementById('notesList');
        const emptyState = document.getElementById('emptyState');
        const countSpan = document.getElementById('count');

        // Render
        function render() {
            list.innerHTML = '';
            countSpan.textContent = `${todos.length} items`;

            if (todos.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                todos.forEach(todo => {
                    const el = document.createElement('div');
                    el.className = `group flex items-center gap-3 p-4 bg-slate-900/50 hover:bg-slate-900 border border-slate-800/50 hover:border-slate-700 rounded-xl transition-all ${todo.done ? 'opacity-60' : ''}`;
                    el.innerHTML = `
                        <button onclick="toggleTodo(${todo.id})" class="w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-colors ${todo.done ? 'bg-green-500 border-green-500 text-white' : 'border-slate-600 hover:border-cyan-500'}">
                            ${todo.done ? '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>' : ''}
                        </button>
                        <span ondblclick="startEdit(${todo.id})" class="flex-1 break-all cursor-text ${todo.done ? 'line-through text-slate-500' : 'text-slate-200'}">${escapeHtml(todo.text)}</span>
                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="startEdit(${todo.id})" class="p-2 hover:bg-slate-800 text-slate-400 hover:text-cyan-400 rounded-lg transition-colors">✏️</button>
                            <button onclick="deleteTodo(${todo.id})" class="p-2 hover:bg-slate-800 text-slate-400 hover:text-red-400 rounded-lg transition-colors">✕</button>
                        </div>
                    `;
                    list.appendChild(el);
                });
            }
            localStorage.setItem('omni_notepad', JSON.stringify(todos));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Actions
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!input.value.trim()) return;

            if (editingId) {
                todos = todos.map(t => t.id === editingId ? { ...t, text: input.value } : t);
                stopEdit();
            } else {
                todos.push({ id: Date.now(), text: input.value, done: false });
                input.value = '';
            }
            render();
        });

        window.toggleTodo = (id) => {
            todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
            render();
        };

        window.deleteTodo = (id) => {
            todos = todos.filter(t => t.id !== id);
            if (editingId === id) stopEdit();
            render();
        };

        window.startEdit = (id) => {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;
            editingId = id;
            input.value = todo.text;
            input.focus();
            submitBtn.textContent = 'Update';
            submitBtn.className = "px-6 py-3 rounded-xl font-bold transition-all shadow-lg hover:shadow-amber-500/20 active:scale-95 bg-amber-500 hover:bg-amber-400 text-black";
            input.placeholder = "Update note...";
            cancelBtn.classList.remove('hidden');
        };

        function stopEdit() {
            editingId = null;
            input.value = '';
            input.placeholder = "Type a new note...";
            submitBtn.textContent = 'Add';
            submitBtn.className = "px-6 py-3 rounded-xl font-bold transition-all shadow-lg hover:shadow-cyan-500/20 active:scale-95 bg-cyan-600 hover:bg-cyan-500 text-white";
            cancelBtn.classList.add('hidden');
        }

        cancelBtn.addEventListener('click', stopEdit);

        // Init
        render();
    </script>
</body>

</html>
